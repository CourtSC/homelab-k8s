apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2025.6.3
    helm:
      values: |
        global:
          security:
            allowInsecureImages: true

        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: bitnamilegacy/postgresql
          auth:
            existingSecret: authentik-secrets
            secretKeys:
              adminPasswordKey: postgresql-postgres-password
              userPasswordKey: postgresql-password
          primary:
            persistence:
              enabled: true
              storageClass: longhorn
              size: 10Gi

        redis:
          enabled: true
          image:
            registry: docker.io
            repository: bitnamilegacy/redis

        server:
          replicas: 1
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: postgresql-password
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: bootstrap-password
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              value: scott.c.court@gmail.com

        worker:
          replicas: 1
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: postgresql-password
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: bootstrap-password
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              value: scott.c.court@gmail.com
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true